server:
  port: 8000

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: users-service
          uri: lb://users-service
          predicates:
            - Path=/api/v1/users/**
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/v1/accounts/**
        - id: transactions-service
          uri: lb://transactions-service
          predicates:
            - Path=/api/v1/transactions/**
        - id: aadhar-service
          uri: lb://aadhar-service
          predicates:
            - Path=/api/v1/aadhar/**
          filters:
            - RewritePath=/api/v1/aadhar/api/v1/(?<segment>.*), /api/v1/$$\{segment}
        - id: company-service
          uri: lb://company-service
          predicates:
            - Path=/api/v1/company/**
        - id: payment-gateway-service
          uri: lb://payment-gateway-service
          predicates:
            - Path=/api/v1/payment/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
