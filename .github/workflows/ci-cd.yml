name: GDB CloudOps CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-test-backend:
    name: Build & Test Backend Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Java Services
        run: |
          for service in aadhar-service account-service auth-service company-service eureka-server gateway-service payment-gateway-service transactions-service users-service; do
            echo "Building $service..."
            (cd "$service" && mvn clean package -Dmaven.test.skip=true)
          done

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            **/target/*.jar
            !**/target/*-sources.jar
            !**/target/*.jar.original

  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies & Build
        run: |
          cd frontend
          npm install
          npm run build

  build-and-push-docker-images:
    name: Build & Push Docker Images
    needs: [build-and-test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Backend Jars
        uses: actions/download-artifact@v4
        with:
          name: backend-jars

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        continue-on-error: true

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Microservices
        run: |
          # Lowercase the repository name for GHCR compatibility
          REPO_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME_PREFIX="ghcr.io/${REPO_NAME_LOWER}"

          # Determine tag (main/dev/commit-sha)
          TAG="latest"
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAG="prod"
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            TAG="dev"
          fi
          
          SERVICES="eureka-server gateway-service auth-service users-service account-service transactions-service aadhar-service company-service payment-gateway-service"
          for svc in $SERVICES; do
            IMAGE_NAME="${IMAGE_NAME_PREFIX}/$svc"
            echo "Building and pushing Docker image for $svc..."
            docker build -t $IMAGE_NAME:$TAG -t $IMAGE_NAME:${{ github.sha }} ./$svc
            docker push $IMAGE_NAME:$TAG
            docker push $IMAGE_NAME:${{ github.sha }}
          done

      - name: Build and Push Frontend
        run: |
          # Lowercase the repository name for GHCR compatibility
          REPO_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME_PREFIX="ghcr.io/${REPO_NAME_LOWER}"

          TAG="latest"
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAG="prod"
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            TAG="dev"
          fi
          
          IMAGE_NAME="${IMAGE_NAME_PREFIX}/frontend"
          echo "Building and pushing Docker image for frontend..."
          docker build -t $IMAGE_NAME:$TAG -t $IMAGE_NAME:${{ github.sha }} ./frontend
          docker push $IMAGE_NAME:$TAG
          docker push $IMAGE_NAME:${{ github.sha }}
