apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: gdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: ghcr.io/gdb/eureka-server:latest
          ports:
            - containerPort: 8761
          imagePullPolicy: IfNotPresent

---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: gdb
spec:
  ports:
    - port: 8761
      targetPort: 8761
  selector:
    app: eureka-server

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: gdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: ghcr.io/gdb/gateway-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: gdb-config
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          imagePullPolicy: IfNotPresent

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: gdb
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: gateway-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: gdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/gdb/auth-service:latest
          ports:
            - containerPort: 8004
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: gdb-config
                  key: AUTH_DB_URL
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: gdb-config
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gdb-secret
                  key: DATABASE_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: gdb-config
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: USERS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: gdb-config
                  key: USERS_SERVICE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gdb-secret
                  key: JWT_SECRET_KEY
          imagePullPolicy: IfNotPresent

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: gdb
spec:
  ports:
    - port: 8004
      targetPort: 8004
  selector:
    app: auth-service

