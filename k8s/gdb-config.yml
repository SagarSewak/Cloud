apiVersion: v1
kind: ConfigMap
metadata:
  name: gdb-config
  namespace: gdb
data:
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
  POSTGRES_DB: "postgres"
  DATABASE_USER: "postgres"
  # Spring Boot datasource URLs pointing to the in-cluster PostgreSQL service
  AUTH_DB_URL: "jdbc:postgresql://postgres-db:5432/auth_db"
  USERS_DB_URL: "jdbc:postgresql://postgres-db:5432/users_db"
  ACCOUNTS_DB_URL: "jdbc:postgresql://postgres-db:5432/accounts_db"
  TRANSACTIONS_DB_URL: "jdbc:postgresql://postgres-db:5432/trasaction_db"
  
  # External microservice URLs within the cluster
  USERS_SERVICE_URL: "http://users-service:8003"
  ACCOUNT_SERVICE_URL: "http://account-service:8001"
  AADHAR_SERVICE_URL: "http://aadhar-service:8005"
  COMPANY_SERVICE_URL: "http://company-service:8006"
  PAYMENT_GATEWAY_SERVICE_URL: "http://payment-gateway-service:8008"

