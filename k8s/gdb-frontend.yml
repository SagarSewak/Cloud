apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: gdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/gdb/frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_BASE_URL
              value: "http://gdb.local/api"
          imagePullPolicy: IfNotPresent

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: gdb
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gdb-ingress
  namespace: gdb
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    - host: gdb.local
      http:
        paths:
          # Route all backend API requests starting with /api to the gateway service
          - path: /api/(.*)
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8000
          # Route all other web requests to the frontend service
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
